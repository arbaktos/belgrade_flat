filters:
  price_eur_max: 1100
  rooms_min: 1.5
  rooms_max: 3.0
  surface_m2_min: 55
  heating_allowed: [centralno, etazno, podno]
  furnishing_allowed: [furnished, semi-furnished]
  floor_exclude: [ground, basement]
  elevator_required: false  # soft preference now — scored in src/score.py, not hard-rejected
  photo_required: true
  # Soft preference: most Serbian listings don't mention dishwasher even when present.
  # We still annotate dishwasher presence in the digest when the LLM finds it.
  dishwasher_required: false
  pets_required: true
  max_lease_months: 12
  freshness_days: 7
  commute:
    walk_min_max: 40          # office gating threshold (walking minutes)
    haversine_prefilter_km: 10
    # Named walking destinations. Coords are resolved from env vars (kept in
    # GitHub Secrets — never commit real locations to this public repo).
    #   gates: true  → this destination's walk gates the commute filter
    #   score_weight → contribution to digest ordering (walk closeness)
    # office(0.45) + Sadik(0.25) + m²(0.10) + fresh(0.10) + lift(0.10) = 1.0
    destinations:
      - name: office
        lat_env: OFFICE_LAT
        lng_env: OFFICE_LNG
        gates: true
        score_weight: 0.45
      - name: Sadik Enter
        lat_env: SADIK_LAT
        lng_env: SADIK_LNG
        gates: false
        score_weight: 0.25

office:
  address: "Kneza Miloša 88A, Beograd, Serbia"

routing:
  cache_grid_decimals: 3
  cache_ttl_days: 90
  daily_call_cap: 500

dedup:
  # Re-notify policy restored (2026-07-10): a card is sent only when
  # something changed — first sighting, any price change (📉 badge on drops
  # ≥ price_drop_badge_pct), a near-miss upgrading to a match, or >14 days
  # since the last card (dedup.RENOTIFY_AFTER_DAYS). Unchanged listings are
  # suppressed and counted in the digest header. 🙈 Hide still suppresses
  # forever.
  price_drop_badge_pct: 5
  fingerprint:
    coord_decimals: 4
    price_bucket_eur: 50
    title_trigram_threshold: 0.8

digest:
  max_perfect: 10
  max_near_miss: 5
  score_weights:
    price: 0.4
    commute: 0.3
    surface: 0.2
    freshness: 0.1

# Documentation only — the real schedule lives in .github/workflows/scrape.yml
# and the mode mapping in src/main.py DIGEST_CRONS. Two full digests a day at
# 10:00 and 16:00 Europe/Belgrade (08:00/14:00 UTC during CEST; GH cron can't
# follow DST, so an hour earlier local during CET).
schedule:
  digest_crons_utc: ["0 8 * * *", "0 14 * * *"]

llm:
  model: "claude-haiku-4-5-20251001"

state:
  r2_key: "state/db.sqlite"

# Telegram-channel side pipeline (separate from the portal scrapers).
# Each entry runs after the main pipeline with only two filters: pets must be
# explicitly allowed AND m² must exceed the threshold. Posts are deduped
# against the portal listings table via image pHash. message_id is persisted
# in the seen_telegram_posts table so each post processes exactly once.
telegram_channels:
  - name: beograd_stan
    m2_min: 55
  # General-interest channel — most posts aren't rentals, so only consider
  # posts tagged #аренда (Russian "rent"). The hashtag pre-filter runs before
  # the LLM call, so noise costs no tokens.
  - name: russian_in_serbia
    m2_min: 55
    require_hashtag: "#аренда"
