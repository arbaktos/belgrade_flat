name: scrape

on:
  schedule:
    - cron: '30 4 * * *'    # 04:30 UTC = 10:30 Asia/Bishkek — daily digest
    - cron: '0 */2 * * *'   # every 2h — perfect-match poll
  workflow_dispatch: {}

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        env:
          LOG_LEVEL: info
          CAPTCHA_SOLVER: none
        # No service healthcheck — the FlareSolverr image doesn't bundle curl/wget,
        # so the runner-side "Wait for FlareSolverr" step handles readiness instead.
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GOOGLE_DIRECTIONS_API_KEY: ${{ secrets.GOOGLE_DIRECTIONS_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      OFFICE_LAT: ${{ secrets.OFFICE_LAT }}
      OFFICE_LNG: ${{ secrets.OFFICE_LNG }}
      GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Wait for FlareSolverr
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8191/ > /dev/null; then
              echo "FlareSolverr ready after ${i}0s"
              break
            fi
            sleep 2
          done
          curl -s http://localhost:8191/ | head -c 400 || true
        env:
          FLARESOLVERR_URL: http://localhost:8191/v1

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run
        run: python -m src.main
        env:
          FLARESOLVERR_URL: http://localhost:8191/v1

      - name: Commit digest + debug artifacts if generated
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "$(git status --porcelain digests/ debug/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add digests/ debug/
            git commit -m "digest: test run ${GITHUB_RUN_ID}"
            git push
          else
            echo "No digest or debug changes to commit."
          fi

      - name: Notify failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=🚨 scrape workflow failed: run ${GITHUB_RUN_ID} (${GITHUB_EVENT_NAME}/${{ github.event.schedule }})"
