name: scrape

on:
  schedule:
    - cron: '30 4 * * *'        # 04:30 UTC = 10:30 Asia/Bishkek — daily digest
    # Every 2h, daytime only. KGT quiet hours are 23:00-08:00 (per config.yaml),
    # i.e. 17:00-01:59 UTC. The window below = 02:00-16:00 UTC (08:00-22:00 KGT).
    - cron: '0 2-16/2 * * *'    # 02,04,06,08,10,12,14,16 UTC = 8 polls/day
  workflow_dispatch: {}

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        env:
          LOG_LEVEL: info
          CAPTCHA_SOLVER: none
        # No service healthcheck — the FlareSolverr image doesn't bundle curl/wget,
        # so the runner-side "Wait for FlareSolverr" step handles readiness instead.
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_FAVORITES_CHAT_ID: ${{ secrets.TELEGRAM_FAVORITES_CHAT_ID }}
      TELEGRAM_FAVORITES_THREAD_ID: ${{ secrets.TELEGRAM_FAVORITES_THREAD_ID }}
      GOOGLE_DIRECTIONS_API_KEY: ${{ secrets.GOOGLE_DIRECTIONS_API_KEY }}
      # LLM extraction provider. Back on Anthropic Haiku 4.5 — original
      # design, best Serbian quality. With extraction_cache (schema v12) and
      # the system-prompt ephemeral cache, real spend at ~30-60 new
      # listings/day is well under $5/mo. GEMINI_API_KEY stays wired as a
      # fallback (flip LLM_PROVIDER: gemini to reactivate; the Gemini code
      # path, daily-cap circuit breaker, and pacing all remain in place).
      LLM_PROVIDER: anthropic
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      OFFICE_LAT: ${{ secrets.OFFICE_LAT }}
      OFFICE_LNG: ${{ secrets.OFFICE_LNG }}
      GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Wait for FlareSolverr
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8191/ > /dev/null; then
              echo "FlareSolverr ready after ${i}0s"
              break
            fi
            sleep 2
          done
          curl -s http://localhost:8191/ | head -c 400 || true
        env:
          FLARESOLVERR_URL: http://localhost:8191/v1

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run
        run: python -m src.main
        env:
          FLARESOLVERR_URL: http://localhost:8191/v1

      - name: Commit digest + debug artifacts if generated
        # Commit on manual dispatch and on the daily digest cron only.
        # The 2h poll cron skips commits to avoid 12 churning commits/day.
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 4 * * *'
        run: |
          if [ -z "$(git status --porcelain digests/ debug/)" ]; then
            echo "No digest or debug changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests/ debug/
          msg_kind="$([ "${GITHUB_EVENT_NAME}" = "schedule" ] && echo "daily" || echo "test")"
          git commit -m "digest: ${msg_kind} run ${GITHUB_RUN_ID}"
          # Retry with a fresh rebase in case a human push raced us.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push attempt ${attempt} rejected; rebasing on origin/main."
            git pull --rebase origin main
          done
          echo "Failed to push after 3 attempts."
          exit 1

      - name: Notify failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=🚨 scrape workflow failed: run ${GITHUB_RUN_ID} (${GITHUB_EVENT_NAME}/${{ github.event.schedule }})"
